<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 WEBSITES · RUBIK'S 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }

        /* 3D Canvas */
        #canvas-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 2;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        h1 {
            font-size: 100px;
            font-weight: 300;
            letter-spacing: -2px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255,255,255,0.2);
            background: linear-gradient(45deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            pointer-events: none;
        }

        .sub {
            font-size: 14px;
            letter-spacing: 6px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 60px;
            pointer-events: none;
        }

        /* Dots - clickable */
        .dots {
            display: flex;
            gap: 25px;
            margin-top: 40px;
            pointer-events: auto;
        }

        .dot {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
            text-decoration: none;
        }

        .dot:hover {
            border-color: #fff;
            color: #fff;
            transform: scale(1.1);
            background: rgba(255,255,255,0.1);
        }

        .dot.active {
            border-color: #fff;
            color: #fff;
            background: rgba(255,255,255,0.15);
        }

        .loading {
            position: fixed;
            bottom: 30px;
            left: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="canvas-3d"></div>

    <div class="content">
        <h1>5 WEBSITES</h1>
        <div class="sub">ONE PAGE · FIVE WORLDS</div>
        
        <div class="dots">
            <a href="luxury.html" class="dot">1</a>
            <a href="tech.html" class="dot">2</a>
            <a href="creative.html" class="dot">3</a>
            <a href="wellness.html" class="dot">4</a>
            <a href="ecommerce.html" class="dot">5</a>
        </div>
    </div>

    <div class="loading">✦ RUBIK'S CUBE · SOLVING ITSELF</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // Setup
        const canvas = document.getElementById('canvas-3d');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        const light1 = new THREE.PointLight(0xffffff, 1);
        light1.position.set(5, 10, 7);
        scene.add(light1);

        const light2 = new THREE.PointLight(0x4466ff, 0.5);
        light2.position.set(-5, 0, 5);
        scene.add(light2);

        // Create a single cube with stickers
        function createStickerCube(x, y, z, colors) {
            const group = new THREE.Group();
            
            // Main cube body (black)
            const geometry = new THREE.BoxGeometry(0.9, 0.9, 0.9);
            const material = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const cube = new THREE.Mesh(geometry, material);
            cube.castShadow = true;
            cube.receiveShadow = true;
            group.add(cube);

            // Add colored stickers on each face
            const stickerSize = 0.15;
            const stickerGeo = new THREE.PlaneGeometry(0.7, 0.7);
            
            // Front face (red)
            if (colors.front) {
                const sticker = new THREE.Mesh(stickerGeo, new THREE.MeshStandardMaterial({ color: colors.front, emissive: colors.front, emissiveIntensity: 0.3 }));
                sticker.position.set(0, 0, 0.46);
                group.add(sticker);
            }
            
            // Back face (orange)
            if (colors.back) {
                const sticker = new THREE.Mesh(stickerGeo, new THREE.MeshStandardMaterial({ color: colors.back, emissive: colors.back, emissiveIntensity: 0.3 }));
                sticker.position.set(0, 0, -0.46);
                sticker.rotation.y = Math.PI;
                group.add(sticker);
            }
            
            // Right face (green)
            if (colors.right) {
                const sticker = new THREE.Mesh(stickerGeo, new THREE.MeshStandardMaterial({ color: colors.right, emissive: colors.right, emissiveIntensity: 0.3 }));
                sticker.position.set(0.46, 0, 0);
                sticker.rotation.y = Math.PI / 2;
                group.add(sticker);
            }
            
            // Left face (blue)
            if (colors.left) {
                const sticker = new THREE.Mesh(stickerGeo, new THREE.MeshStandardMaterial({ color: colors.left, emissive: colors.left, emissiveIntensity: 0.3 }));
                sticker.position.set(-0.46, 0, 0);
                sticker.rotation.y = -Math.PI / 2;
                group.add(sticker);
            }
            
            // Top face (white)
            if (colors.top) {
                const sticker = new THREE.Mesh(stickerGeo, new THREE.MeshStandardMaterial({ color: colors.top, emissive: colors.top, emissiveIntensity: 0.3 }));
                sticker.position.set(0, 0.46, 0);
                sticker.rotation.x = -Math.PI / 2;
                group.add(sticker);
            }
            
            // Bottom face (yellow)
            if (colors.bottom) {
                const sticker = new THREE.Mesh(stickerGeo, new THREE.MeshStandardMaterial({ color: colors.bottom, emissive: colors.bottom, emissiveIntensity: 0.3 }));
                sticker.position.set(0, -0.46, 0);
                sticker.rotation.x = Math.PI / 2;
                group.add(sticker);
            }

            group.position.set(x, y, z);
            return group;
        }

        // Create the full Rubik's cube
        const cubeGroup = new THREE.Group();
        const cubes = [];

        // Colors for a solved cube: front=red, back=orange, right=green, left=blue, top=white, bottom=yellow
        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    // Skip the center piece
                    if (x === 0 && y === 0 && z === 0) continue;
                    
                    const colors = {
                        front: z === 1 ? 0xff3333 : null,      // red
                        back: z === -1 ? 0xff8800 : null,      // orange
                        right: x === 1 ? 0x33ff33 : null,       // green
                        left: x === -1 ? 0x3333ff : null,       // blue
                        top: y === 1 ? 0xffffff : null,         // white
                        bottom: y === -1 ? 0xffff33 : null      // yellow
                    };
                    
                    const cube = createStickerCube(x, y, z, colors);
                    cubeGroup.add(cube);
                    cubes.push(cube);
                }
            }
        }

        scene.add(cubeGroup);

        // Add a subtle grid floor
        const gridHelper = new THREE.GridHelper(10, 20, 0x333333, 0x222222);
        gridHelper.position.y = -2;
        scene.add(gridHelper);

        // Animation sequences for solving
        const sequences = [
            { axis: 'y', layer: 1, angle: Math.PI/2, duration: 1000 },  // Rotate top
            { axis: 'x', layer: 1, angle: -Math.PI/2, duration: 1000 }, // Rotate right
            { axis: 'z', layer: 1, angle: Math.PI/2, duration: 1000 },  // Rotate front
            { axis: 'y', layer: -1, angle: -Math.PI/2, duration: 1000 }, // Rotate bottom
            { axis: 'x', layer: -1, angle: Math.PI/2, duration: 1000 },  // Rotate left
            { axis: 'z', layer: -1, angle: -Math.PI/2, duration: 1000 }, // Rotate back
        ];

        let currentSequence = 0;
        let animating = false;
        let startTime = 0;
        let startRotation = {};
        let targetRotation = {};

        function startNextRotation() {
            if (currentSequence >= sequences.length) {
                currentSequence = 0; // Loop forever
            }
            
            const seq = sequences[currentSequence];
            animating = true;
            startTime = Date.now();
            
            // Store starting rotations for affected cubes
            startRotation = {};
            cubes.forEach(cube => {
                if (Math.abs(cube.position[seq.axis]) === seq.layer) {
                    startRotation[cube.id] = {
                        x: cube.rotation.x,
                        y: cube.rotation.y,
                        z: cube.rotation.z
                    };
                }
            });
            
            targetRotation = {
                axis: seq.axis,
                angle: seq.angle
            };
        }

        // Mouse interaction
        let mouseX = 0;
        let mouseY = 0;
        
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (event.clientY / window.innerHeight - 0.5) * 2;
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Handle cube solving animation
            if (animating) {
                const elapsed = Date.now() - startTime;
                const duration = sequences[currentSequence].duration;
                const progress = Math.min(elapsed / duration, 1);
                
                // Easing function
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                
                // Apply rotation to affected cubes
                cubes.forEach(cube => {
                    if (Math.abs(cube.position[targetRotation.axis]) === sequences[currentSequence].layer) {
                        const start = startRotation[cube.id];
                        if (start) {
                            cube.rotation[targetRotation.axis] = start[targetRotation.axis] + targetRotation.angle * easeProgress;
                        }
                    }
                });
                
                if (progress >= 1) {
                    animating = false;
                    currentSequence++;
                    setTimeout(startNextRotation, 500); // Pause between moves
                }
            }

            // Rotate entire cube group based on mouse
            cubeGroup.rotation.y += (mouseX * 2 - cubeGroup.rotation.y) * 0.02;
            cubeGroup.rotation.x += (mouseY * 1 - cubeGroup.rotation.x) * 0.02;

            renderer.render(scene, camera);
        }

        animate();

        // Start the first rotation
        setTimeout(startNextRotation, 1000);

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
