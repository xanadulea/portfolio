<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 THEMES · 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* 3D Canvas */
        #canvas-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 2;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.8s ease;
            backdrop-filter: blur(2px);
        }

        /* Theme 1: Retro */
        body.theme-retro {
            background: #0a0a1a;
        }
        .theme-retro .content {
            color: #ff00ff;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #ff00ff;
        }
        .theme-retro h1 {
            font-size: 120px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 20px;
            animation: glitch 3s infinite;
        }
        @keyframes glitch {
            0% { transform: skew(0deg); }
            5% { transform: skew(2deg); text-shadow: -2px 0 cyan, 2px 0 magenta; }
            10% { transform: skew(-2deg); }
            15% { transform: skew(0deg); }
        }
        .theme-retro .sub {
            font-size: 16px;
            letter-spacing: 8px;
            color: #00ffff;
        }

        /* Theme 2: Sci-Fi */
        body.theme-scifi {
            background: #001020;
        }
        .theme-scifi .content {
            color: #88ddff;
            font-family: 'Space Mono', monospace;
        }
        .theme-scifi h1 {
            font-size: 100px;
            font-weight: 400;
            letter-spacing: 10px;
            text-transform: uppercase;
            border-right: 4px solid #00aaff;
            padding-right: 20px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: #00aaff; }
        }
        .theme-scifi .sub {
            color: #88ddff;
            opacity: 0.7;
        }

        /* Theme 3: Luxury */
        body.theme-luxury {
            background: #0a0a0a;
        }
        .theme-luxury .content {
            color: #d4af37;
            font-family: 'Playfair Display', serif;
        }
        .theme-luxury h1 {
            font-size: 120px;
            font-weight: 300;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(212,175,55,0.3);
        }
        .theme-luxury h1 span {
            font-weight: 700;
            color: #fff;
        }
        .theme-luxury .sub {
            letter-spacing: 12px;
            font-size: 14px;
            color: rgba(212,175,55,0.6);
        }

        /* Theme 4: Natural */
        body.theme-natural {
            background: #1a2a1a;
        }
        .theme-natural .content {
            color: #d4b38c;
            font-family: 'Inter', sans-serif;
        }
        .theme-natural h1 {
            font-size: 100px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #e8d5b5;
        }
        .theme-natural .sub {
            color: #a8c3a8;
            letter-spacing: 6px;
        }

        /* Theme 5: Minimal */
        body.theme-minimal {
            background: #f5f5f5;
        }
        .theme-minimal .content {
            color: #111;
            font-family: 'Inter', sans-serif;
        }
        .theme-minimal h1 {
            font-size: 100px;
            font-weight: 200;
            letter-spacing: -2px;
        }
        .theme-minimal .sub {
            color: #666;
            font-weight: 300;
        }

        /* Common elements */
        h1 {
            margin-bottom: 20px;
            transition: all 0.8s ease;
        }

        .sub {
            font-size: 14px;
            margin-bottom: 60px;
            transition: all 0.8s ease;
        }

        /* Dots */
        .dots {
            display: flex;
            gap: 30px;
            margin-top: 40px;
            z-index: 10;
        }

        .dot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }

        .dot:hover {
            transform: scale(1.2);
        }

        .dot.active {
            border-color: currentColor;
            transform: scale(1.1);
        }

        /* Dot colors per theme */
        .theme-retro .dot { background: #ff00ff; box-shadow: 0 0 20px #00ffff; }
        .theme-scifi .dot { background: #00aaff; box-shadow: 0 0 20px #00aaff; }
        .theme-luxury .dot { background: #d4af37; box-shadow: 0 0 20px #d4af37; }
        .theme-natural .dot { background: #a8c3a8; box-shadow: 0 0 20px #a8c3a8; }
        .theme-minimal .dot { background: #111; box-shadow: 0 0 20px #999; }

        /* Loading */
        .loading {
            position: fixed;
            bottom: 30px;
            left: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            z-index: 10;
        }
    </style>
</head>
<body class="theme-retro">
    <div id="canvas-3d"></div>

    <div class="content">
        <h1 id="main-title">RETRO<span>WAVE</span></h1>
        <div class="sub" id="main-sub">1980s · NEON · DIGITAL</div>
        
        <div class="dots">
            <div class="dot active" data-theme="retro"></div>
            <div class="dot" data-theme="scifi"></div>
            <div class="dot" data-theme="luxury"></div>
            <div class="dot" data-theme="natural"></div>
            <div class="dot" data-theme="minimal"></div>
        </div>
    </div>

    <div class="loading">✦ 5 THEMES · 5 WORLDS</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Setup
        const canvas = document.getElementById('canvas-3d');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;
        
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        // Create different 3D objects for each theme
        let currentObjects = [];

        function createRetroTheme() {
            const group = new THREE.Group();
            
            // Neon grid floor
            const gridHelper = new THREE.GridHelper(20, 20, 0xff00ff, 0x00ffff);
            gridHelper.position.y = -2;
            group.add(gridHelper);

            // Floating cubes
            for (let i = 0; i < 10; i++) {
                const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                const material = new THREE.MeshStandardMaterial({ 
                    color: Math.random() > 0.5 ? 0xff00ff : 0x00ffff,
                    emissive: 0x222222,
                    transparent: true,
                    opacity: 0.8
                });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.x = (Math.random() - 0.5) * 8;
                cube.position.y = (Math.random() - 0.5) * 4;
                cube.position.z = (Math.random() - 0.5) * 5;
                group.add(cube);
            }

            return group;
        }

        function createSciFiTheme() {
            const group = new THREE.Group();
            
            // Wireframe sphere
            const sphereGeo = new THREE.SphereGeometry(2, 16, 16);
            const sphereMat = new THREE.MeshStandardMaterial({ 
                color: 0x00aaff,
                wireframe: true,
                emissive: 0x004466
            });
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            sphere.position.y = 1;
            group.add(sphere);

            // Floating particles
            const particlesGeo = new THREE.BufferGeometry();
            const particlesPos = [];
            for (let i = 0; i < 200; i++) {
                particlesPos.push((Math.random() - 0.5) * 15);
                particlesPos.push((Math.random() - 0.5) * 10);
                particlesPos.push((Math.random() - 0.5) * 15);
            }
            particlesGeo.setAttribute('position', new THREE.Float32BufferAttribute(particlesPos, 3));
            const particlesMat = new THREE.PointsMaterial({ color: 0x88ddff, size: 0.05 });
            const particles = new THREE.Points(particlesGeo, particlesMat);
            group.add(particles);

            return group;
        }

        function createLuxuryTheme() {
            const group = new THREE.Group();
            
            // Golden rings
            for (let i = 0; i < 5; i++) {
                const ringGeo = new THREE.TorusGeometry(2 + i * 0.5, 0.1, 16, 100);
                const ringMat = new THREE.MeshStandardMaterial({ 
                    color: 0xd4af37,
                    emissive: 0x332211,
                    roughness: 0.3,
                    metalness: 0.8
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                ring.rotation.z = i * 0.5;
                group.add(ring);
            }

            return group;
        }

        function createNaturalTheme() {
            const group = new THREE.Group();
            
            // Organic shapes
            for (let i = 0; i < 20; i++) {
                const geo = new THREE.SphereGeometry(0.3 + Math.random() * 0.3, 5);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: Math.random() > 0.5 ? 0xa8c3a8 : 0xd4b38c,
                    roughness: 0.7
                });
                const sphere = new THREE.Mesh(geo, mat);
                sphere.position.x = (Math.random() - 0.5) * 10;
                sphere.position.y = (Math.random() - 0.5) * 6;
                sphere.position.z = (Math.random() - 0.5) * 8;
                group.add(sphere);
            }

            return group;
        }

        function createMinimalTheme() {
            const group = new THREE.Group();
            
            // Simple floating lines
            for (let i = 0; i < 10; i++) {
                const lineGeo = new THREE.BoxGeometry(0.1, 2, 0.1);
                const lineMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.position.x = (Math.random() - 0.5) * 12;
                line.position.z = (Math.random() - 0.5) * 8;
                group.add(line);
            }

            return group;
        }

        // Theme switching
        const dots = document.querySelectorAll('.dot');
        const body = document.body;
        const mainTitle = document.getElementById('main-title');
        const mainSub = document.getElementById('main-sub');

        const themeData = {
            retro: {
                title: 'RETRO<span>WAVE</span>',
                sub: '1980s · NEON · DIGITAL',
                create3D: createRetroTheme
            },
            scifi: {
                title: 'NOVA<span>CORE</span>',
                sub: '2112 · FUTURISTIC · TECH',
                create3D: createSciFiTheme
            },
            luxury: {
                title: 'LUXE<span>COLLECTION</span>',
                sub: 'ELEGANCE · GOLD · BESPOKE',
                create3D: createLuxuryTheme
            },
            natural: {
                title: 'EARTH<span>& SOUL</span>',
                sub: 'ORGANIC · PURE · BALANCE',
                create3D: createNaturalTheme
            },
            minimal: {
                title: 'LESS<span>IS MORE</span>',
                sub: 'CLEAN · SIMPLE · MODERN',
                create3D: createMinimalTheme
            }
        };

        function setTheme(theme) {
            // Update body class
            body.className = `theme-${theme}`;
            
            // Update text
            mainTitle.innerHTML = themeData[theme].title;
            mainSub.textContent = themeData[theme].sub;
            
            // Update dots
            dots.forEach(dot => {
                dot.classList.remove('active');
                if (dot.dataset.theme === theme) {
                    dot.classList.add('active');
                }
            });

            // Update 3D scene
            currentObjects.forEach(obj => scene.remove(obj));
            currentObjects = [];
            
            const newObjects = themeData[theme].create3D();
            scene.add(newObjects);
            currentObjects.push(newObjects);
        }

        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                setTheme(dot.dataset.theme);
            });
        });

        // Animation
        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (event.clientY / window.innerHeight - 0.5) * 2;
        });

        function animate() {
            requestAnimationFrame(animate);

            // Rotate current objects based on mouse
            currentObjects.forEach(obj => {
                obj.rotation.y += (mouseX * 0.02 - obj.rotation.y) * 0.02;
                obj.rotation.x += (mouseY * 0.02 - obj.rotation.x) * 0.02;
            });

            renderer.render(scene, camera);
        }

        animate();

        // Initialize with retro theme
        setTheme('retro');

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
