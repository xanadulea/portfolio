<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO · BLACK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Simple canvas */
        #canvas-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.8;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
            pointer-events: none;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            margin-bottom: 120px;
            pointer-events: auto;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 8px;
            color: rgba(255,255,255,0.8);
        }

        .logo span {
            font-weight: 700;
            color: #fff;
        }

        .nav-links {
            display: flex;
            gap: 60px;
        }

        .nav-links a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 3px;
            transition: color 0.3s;
            text-transform: uppercase;
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 180px;
        }

        h1 {
            font-size: 120px;
            font-weight: 200;
            letter-spacing: -4px;
            line-height: 0.9;
            margin-bottom: 30px;
        }

        h1 span {
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
        }

        /* Stats */
        .stats {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-bottom: 180px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 60px;
            font-weight: 200;
            margin-bottom: 10px;
            color: #fff;
        }

        .stat-label {
            font-size: 13px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }

        /* Work grid - SQUARES like you wanted */
        .work-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-bottom: 180px;
        }

        .work-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 50px 40px;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .work-item:hover {
            transform: translateY(-10px);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.04);
        }

        .work-year {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        .work-title {
            font-size: 36px;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .work-category {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        /* CTA */
        .cta {
            text-align: center;
            padding: 100px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 80px;
        }

        .cta h2 {
            font-size: 60px;
            font-weight: 200;
            margin-bottom: 40px;
        }

        .cta h2 span {
            font-weight: 700;
            color: #fff;
        }

        .cta-btn {
            display: inline-block;
            padding: 20px 60px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 3px;
            transition: all 0.3s;
            pointer-events: auto;
            text-transform: uppercase;
        }

        .cta-btn:hover {
            border-color: #fff;
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            letter-spacing: 2px;
            pointer-events: auto;
        }

        .footer-links {
            display: flex;
            gap: 40px;
        }

        .footer-links a {
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #fff;
        }

        /* Scroll indicator - simple */
        .scroll-indicator {
            position: fixed;
            bottom: 30px;
            right: 30px;
            color: rgba(255,255,255,0.2);
            font-size: 11px;
            letter-spacing: 3px;
            writing-mode: vertical-rl;
            z-index: 10;
        }

        /* Loading - simple */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-line {
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { transform: scaleX(0); opacity: 0; }
            50% { transform: scaleX(1); opacity: 1; }
            100% { transform: scaleX(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-line"></div>
    </div>

    <canvas id="canvas-3d"></canvas>

    <div class="scroll-indicator">SCROLL</div>

    <div class="content">
        <nav>
            <div class="logo"><span>✦</span> STUDIO</div>
            <div class="nav-links">
                <a href="#">WORK</a>
                <a href="#">STUDIO</a>
                <a href="#">CONTACT</a>
            </div>
        </nav>

        <section class="hero">
            <h1>CREATE <span>WITH</span> PURPOSE</h1>
            <p>Digital experiences crafted at the intersection of design and technology</p>
        </section>

        <section class="stats">
            <div class="stat-item">
                <div class="stat-number" id="stat1">8+</div>
                <div class="stat-label">YEARS</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="stat2">50+</div>
                <div class="stat-label">PROJECTS</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="stat3">20+</div>
                <div class="stat-label">CLIENTS</div>
            </div>
        </section>

        <section class="work-grid">
            <div class="work-item">
                <div class="work-year">2024</div>
                <div class="work-title">NEBULA</div>
                <div class="work-category">AI PLATFORM</div>
            </div>
            <div class="work-item">
                <div class="work-year">2024</div>
                <div class="work-title">ECHO</div>
                <div class="work-category">FINANCE APP</div>
            </div>
            <div class="work-item">
                <div class="work-year">2023</div>
                <div class="work-title">AURA</div>
                <div class="work-category">HEALTHCARE</div>
            </div>
        </section>

        <section class="cta">
            <h2>Ready to build <span>something?</span></h2>
            <a href="#" class="cta-btn">START HERE</a>
        </section>

        <footer>
            <div>© 2026 STUDIO</div>
            <div class="footer-links">
                <a href="#">IG</a>
                <a href="#">LI</a>
                <a href="#">GH</a>
            </div>
        </footer>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Simple setup
        const canvas = document.getElementById('canvas-3d');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;
        
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Simple particles
        const particlesGeo = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 20;
            posArray[i+1] = (Math.random() - 0.5) * 20;
            posArray[i+2] = (Math.random() - 0.5) * 20;
        }
        
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff });
        const particlesMesh = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particlesMesh);

        // Animation
        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.0002;
            renderer.render(scene, camera);
        }
        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Hide loading
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 1500);
    </script>
</body>
</html>
