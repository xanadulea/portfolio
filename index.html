<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP PORTFOLIO • Minimal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
        }

        /* Loading Screen */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-content {
            text-align: center;
        }

        .loader-line {
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            margin: 20px auto;
            animation: loaderWidth 2s infinite;
        }

        @keyframes loaderWidth {
            0% { width: 0px; opacity: 0; }
            50% { width: 200px; opacity: 1; }
            100% { width: 0px; opacity: 0; }
        }

        /* Main Interface */
        #interface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 4px;
            opacity: 0.7;
        }

        .logo span {
            font-weight: 600;
            opacity: 1;
        }

        .nav {
            display: flex;
            gap: 40px;
        }

        .nav-item {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .nav-item:hover {
            opacity: 1;
        }

        /* Hero Section */
        .hero {
            margin-bottom: 60px;
        }

        .hero-title {
            font-size: 80px;
            font-weight: 300;
            letter-spacing: -2px;
            line-height: 0.9;
            margin-bottom: 10px;
        }

        .hero-title span {
            font-weight: 600;
            background: linear-gradient(45deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 14px;
            opacity: 0.5;
            letter-spacing: 2px;
        }

        /* Main Content - App focused */
        .main-content {
            display: flex;
            gap: 60px;
            flex: 1;
            align-items: center;
        }

        /* Left side - App Mockup (big and prominent) */
        .mockup-container {
            flex: 1;
            perspective: 1000px;
            display: flex;
            justify-content: center;
        }

        .phone-mockup {
            width: 320px;
            height: 650px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateY(-5deg) rotateX(2deg);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .phone-mockup:hover {
            transform: rotateY(-3deg) rotateX(1deg) translateY(-10px);
        }

        .phone-mockup.open {
            transform: rotateY(0deg) rotateX(0deg) scale(1.1);
        }

        .phone-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border-radius: 40px;
            border: 1px solid #333;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .phone-screen {
            position: absolute;
            top: 20px;
            left: 15px;
            right: 15px;
            bottom: 20px;
            background: #000;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background: #1a1a1a;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 10;
            border: 1px solid #333;
            border-top: none;
        }

        /* App Content */
        .app-content {
            text-align: center;
            transition: all 0.3s ease;
        }

        .app-icon {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 20px rgba(255,255,255,0.1));
        }

        .app-name {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .app-category {
            font-size: 12px;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        /* App Open State */
        .app-open {
            display: none;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        .phone-mockup.open .app-content {
            display: none;
        }

        .phone-mockup.open .app-open {
            display: block;
        }

        .app-open-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .app-header h3 {
            font-size: 18px;
            font-weight: 500;
        }

        .close-btn {
            font-size: 24px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .close-btn:hover {
            opacity: 1;
        }

        .app-features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .feature {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid #333;
        }

        .feature span {
            font-size: 24px;
            display: block;
            margin-bottom: 5px;
        }

        .feature p {
            font-size: 10px;
            opacity: 0.7;
        }

        /* Right side - Project List */
        .projects {
            flex: 0.8;
        }

        .project-item {
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #333;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
        }

        .project-item:hover {
            border-color: #666;
            transform: translateX(-5px);
            background: rgba(255,255,255,0.05);
        }

        .project-item.active {
            border-color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .project-year {
            font-size: 12px;
            opacity: 0.5;
            margin-bottom: 5px;
        }

        .project-name {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 5px;
        }

        .project-type {
            font-size: 12px;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        /* Bottom Bar */
        .bottom-bar {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 40px;
        }

        /* Theme Dots */
        .theme-selector {
            display: flex;
            gap: 15px;
        }

        .theme-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid transparent;
        }

        .theme-dot:hover {
            transform: scale(1.2);
        }

        .theme-dot.active {
            border-color: #fff;
            transform: scale(1.1);
        }

        .theme-dot[data-theme="dark"] {
            background: linear-gradient(135deg, #0a0a0a, #333);
        }

        .theme-dot[data-theme="purple"] {
            background: linear-gradient(135deg, #1a1a2e, #4a1e4a);
        }

        .theme-dot[data-theme="blue"] {
            background: linear-gradient(135deg, #0a1a2a, #1e4a6a);
        }

        .theme-dot[data-theme="green"] {
            background: linear-gradient(135deg, #0a2a1a, #1e6a4a);
        }

        .theme-dot[data-theme="orange"] {
            background: linear-gradient(135deg, #2a1a0a, #6a4a1e);
        }

        .theme-dot::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            background: #1a1a1a;
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px solid #333;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .theme-dot:hover::after {
            opacity: 1;
        }

        .social-links {
            display: flex;
            gap: 30px;
        }

        .social-link {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .social-link:hover {
            opacity: 1;
        }

        .counter {
            font-size: 14px;
            opacity: 0.5;
        }

        .counter span {
            font-size: 24px;
            font-weight: 300;
            color: #fff;
            margin-right: 5px;
            opacity: 1;
        }

        /* 3D Canvas */
        #canvas3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>
<body class="theme-dark">
    <div class="loader" id="loader">
        <div class="loader-content">
            <div style="font-size: 12px; letter-spacing: 4px; margin-bottom: 20px;">APP PORTFOLIO</div>
            <div class="loader-line"></div>
            <div style="font-size: 10px; margin-top: 20px; opacity: 0.5;">5 APPS • 5 THEMES</div>
        </div>
    </div>

    <div id="interface">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <span>✦</span> APP STUDIO
            </div>
            <div class="nav">
                <a href="#" class="nav-item">Apps</a>
                <a href="#" class="nav-item">Work</a>
                <a href="#" class="nav-item">Studio</a>
                <a href="#" class="nav-item">Contact</a>
            </div>
        </div>

        <!-- Hero -->
        <div class="hero">
            <div class="hero-title">
                MOBILE <span>APPS</span>
            </div>
            <div class="hero-subtitle">
                iOS • Android • Cross-Platform
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left: App Mockup -->
            <div class="mockup-container">
                <div class="phone-mockup" id="phoneMockup">
                    <div class="phone-frame">
                        <div class="phone-notch"></div>
                        <div class="phone-screen" id="phoneScreen">
                            <!-- Closed State -->
                            <div class="app-content" id="appClosed">
                                <div class="app-icon" id="appIcon">📱</div>
                                <div class="app-name" id="appName">NEBULA</div>
                                <div class="app-category" id="appCategory">SOCIAL APP</div>
                            </div>
                            
                            <!-- Open State (app preview) -->
                            <div class="app-open" id="appOpen">
                                <div class="app-open-content">
                                    <div class="app-header">
                                        <h3 id="openAppName">NEBULA</h3>
                                        <span class="close-btn" id="closeApp">✕</span>
                                    </div>
                                    <div class="app-features" id="appFeatures">
                                        <!-- Features will be populated by JS -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Project List -->
            <div class="projects">
                <div class="project-item active" data-project="0">
                    <div class="project-year">2024</div>
                    <div class="project-name">NEBULA</div>
                    <div class="project-type">SOCIAL APP</div>
                </div>
                <div class="project-item" data-project="1">
                    <div class="project-year">2024</div>
                    <div class="project-name">ECHO</div>
                    <div class="project-type">MESSAGING</div>
                </div>
                <div class="project-item" data-project="2">
                    <div class="project-year">2023</div>
                    <div class="project-name">AURA</div>
                    <div class="project-type">WELLNESS</div>
                </div>
                <div class="project-item" data-project="3">
                    <div class="project-year">2023</div>
                    <div class="project-name">SOLARIS</div>
                    <div class="project-type">WEATHER</div>
                </div>
                <div class="project-item" data-project="4">
                    <div class="project-year">2022</div>
                    <div class="project-name">LUMINA</div>
                    <div class="project-type">PHOTO EDITOR</div>
                </div>
            </div>
        </div>

        <!-- Bottom Bar -->
        <div class="bottom-bar">
            <div class="counter">
                <span id="projectCounter">01</span> / 05
            </div>
            <div class="theme-selector">
                <div class="theme-dot active" data-theme="dark" data-tooltip="DARK"></div>
                <div class="theme-dot" data-theme="purple" data-tooltip="PURPLE"></div>
                <div class="theme-dot" data-theme="blue" data-tooltip="BLUE"></div>
                <div class="theme-dot" data-theme="green" data-tooltip="GREEN"></div>
                <div class="theme-dot" data-theme="orange" data-tooltip="ORANGE"></div>
            </div>
            <div class="social-links">
                <a href="#" class="social-link">GH</a>
                <a href="#" class="social-link">IG</a>
                <a href="#" class="social-link">LI</a>
            </div>
        </div>
    </div>

    <canvas id="canvas3d"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ===== THREE.JS BACKGROUND =====
        const canvas = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // Particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 10;
            posArray[i+1] = (Math.random() - 0.5) * 10;
            posArray[i+2] = (Math.random() - 0.5) * 10;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);
        
        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.0002;
            renderer.render(scene, camera);
        }
        animate();

        // ===== APP INTERACTIONS =====
        const phoneMockup = document.getElementById('phoneMockup');
        const appClosed = document.getElementById('appClosed');
        const appOpen = document.getElementById('appOpen');
        const closeBtn = document.getElementById('closeApp');
        const appIcon = document.getElementById('appIcon');
        const appName = document.getElementById('appName');
        const appCategory = document.getElementById('appCategory');
        const openAppName = document.getElementById('openAppName');
        const appFeatures = document.getElementById('appFeatures');
        
        const projects = document.querySelectorAll('.project-item');
        const projectCounter = document.getElementById('projectCounter');
        const themeDots = document.querySelectorAll('.theme-dot');
        const body = document.body;

        // App data
        const apps = [
            {
                name: 'NEBULA',
                category: 'SOCIAL APP',
                icon: '🌌',
                features: ['📸 Feed', '💬 Chat', '🔔 Stories', '👥 Friends']
            },
            {
                name: 'ECHO',
                category: 'MESSAGING',
                icon: '🌊',
                features: ['💬 Chats', '📞 Calls', '🎥 Video', '🔒 Privacy']
            },
            {
                name: 'AURA',
                category: 'WELLNESS',
                icon: '✨',
                features: ['🧘 Meditate', '💤 Sleep', '❤️ Health', '📊 Track']
            },
            {
                name: 'SOLARIS',
                category: 'WEATHER',
                icon: '☀️',
                features: ['🌡️ Temp', '🌧️ Rain', '💨 Wind', '📍 Maps']
            },
            {
                name: 'LUMINA',
                category: 'PHOTO EDITOR',
                icon: '💫',
                features: ['✂️ Crop', '🎨 Filters', '✨ Effects', '🖼️ Export']
            }
        ];

        // Open app when phone clicked
        phoneMockup.addEventListener('click', (e) => {
            if (!e.target.classList.contains('close-btn')) {
                phoneMockup.classList.add('open');
            }
        });

        // Close app
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            phoneMockup.classList.remove('open');
        });

        // Switch projects
        projects.forEach((project, index) => {
            project.addEventListener('click', () => {
                // Update active project
                projects.forEach(p => p.classList.remove('active'));
                project.classList.add('active');
                
                // Update counter
                projectCounter.textContent = `0${index + 1}`;
                
                // Update app info
                const app = apps[index];
                appIcon.textContent = app.icon;
                appName.textContent = app.name;
                appCategory.textContent = app.category;
                openAppName.textContent = app.name;
                
                // Update features
                appFeatures.innerHTML = app.features.map(f => 
                    `<div class="feature"><span>${f.split(' ')[0]}</span><p>${f.split(' ')[1]}</p></div>`
                ).join('');
                
                // Close phone if open
                phoneMockup.classList.remove('open');
            });
        });

        // Theme switching
        themeDots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                const themes = ['dark', 'purple', 'blue', 'green', 'orange'];
                
                // Remove all theme classes
                themes.forEach(t => body.classList.remove(`theme-${t}`));
                
                // Add new theme
                body.classList.add(`theme-${themes[index]}`);
                
                // Update active dot
                themeDots.forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                
                // Update particle colors based on theme
                let color;
                switch(themes[index]) {
                    case 'dark': color = 0xffffff; break;
                    case 'purple': color = 0x8866ff; break;
                    case 'blue': color = 0x3399ff; break;
                    case 'green': color = 0x33ff99; break;
                    case 'orange': color = 0xff9933; break;
                }
                particlesMesh.material.color.setHex(color);
            });
        });

        // Hide loader
        setTimeout(() => {
            document.getElementById('loader').classList.add('hidden');
        }, 2000);

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Set initial app
        const firstApp = apps[0];
        appIcon.textContent = firstApp.icon;
        appName.textContent = firstApp.name;
        appCategory.textContent = firstApp.category;
        openAppName.textContent = firstApp.name;
        appFeatures.innerHTML = firstApp.features.map(f => 
            `<div class="feature"><span>${f.split(' ')[0]}</span><p>${f.split(' ')[1]}</p></div>`
        ).join('');
    </script>
</body>
</html>
